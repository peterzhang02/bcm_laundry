
<!DOCTYPE html>

<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Laundry Habits Quiz</title>

  <style>

    :root {

      color-scheme: light;

      --bg: #f7f9fc;

      --card: #ffffff;

      --text: #333;

      --muted: #666;

      --border: #d9e0ea;

      --primary: #0078d4;

      --primary-dark: #005fa3;

      --shadow: 0 8px 24px rgba(0, 0, 0, 0.06);

    }

 

    * { box-sizing: border-box; }

 

    body {

      font-family: Arial, sans-serif;

      max-width: 760px;

      margin: 0 auto;

      padding: 32px 20px 48px;

      background: var(--bg);

      color: var(--text);

      line-height: 1.5;

    }

 

    h1 {

      text-align: center;

      margin-bottom: 8px;

    }

 

    .intro,

    .helper,

    .counter {

      text-align: center;

    }

 

    .intro {

      margin-bottom: 8px;

      font-size: 1.05rem;

    }

 

    .helper {

      color: var(--muted);

      margin-bottom: 24px;

      font-size: 0.95rem;

    }

 

    form {

      display: grid;

      gap: 16px;

    }

 

    .question {

      background: var(--card);

      border: 1px solid var(--border);

      border-radius: 12px;

      padding: 18px;

      box-shadow: var(--shadow);

    }

 

    .question p {

      margin-top: 0;

      margin-bottom: 12px;

      font-size: 1rem;

    }

 

    .option {

      display: block;

      margin-bottom: 10px;

      padding: 10px 12px;

      border-radius: 8px;

      transition: background 0.15s ease, border-color 0.15s ease;

      border: 1px solid transparent;

      cursor: pointer;

    }

 

    .option:hover {

      background: #f2f7fd;

      border-color: #c9ddf2;

    }

 

    .actions {

      display: flex;

      flex-wrap: wrap;

      gap: 12px;

      justify-content: center;

      margin-top: 8px;

    }

 

    button {

      padding: 12px 20px;

      font-size: 16px;

      cursor: pointer;

      background: var(--primary);

      color: white;

      border: none;

      border-radius: 8px;

      min-width: 160px;

    }

 

    button:hover {

      background: var(--primary-dark);

    }

 

    #result {

      margin-top: 28px;

      padding: 20px;

      border-radius: 12px;

      background: var(--card);

      border: 1px solid var(--border);

      box-shadow: var(--shadow);

      display: none;

    }

 

    .score-badge {

      display: inline-block;

      margin-top: 6px;

      padding: 6px 10px;

      border-radius: 999px;

      background: #eef5fc;

      color: #1e4d7b;

      font-weight: bold;

    }

 

    .tips {

      margin: 14px 0 0;

      padding-left: 20px;

    }

 

    .counter {

      margin-top: 40px;

      font-size: 14px;

      color: var(--muted);

    }

 

    @media (max-width: 600px) {

      body {

        padding: 24px 14px 40px;

      }

 

      .question {

        padding: 16px;

      }

 

      button {

        width: 100%;

      }

    }

  </style>

</head>

<body>

  <h1>🧺 Laundry Habit Quiz</h1>

  <p class="intro">

    Are you a <strong>Laundry Legend</strong> or a <strong>Chaos Goblin</strong>?<br>

    Find out in under 1 minute 👇

  </p>

  <p class="helper">Questions and answer options are shuffled each time so the best choice is less obvious.</p>

 

  <form id="quizForm"></form>

 

  <div class="actions">

    <button type="button" id="resultButton">See My Result</button>

  </div>

 

  <div id="result" aria-live="polite"></div>

 

  <div class="counter">

    👀 Page views on this device: <span id="viewCount">0</span>

  </div>

 

  <script>

    const questions = [

      {

        id: "q1",

        text: "How full do you load the machine?",

        options: [

          { text: "Stuff it full", score: 0 },

          { text: "About 3/4 full", score: 1 },

          { text: "Leave space for movement", score: 2 }

        ]

      },

      {

        id: "q2",

        text: "Do you check care labels?",

        options: [

          { text: "Never", score: 0 },

          { text: "Sometimes", score: 1 },

          { text: "Usually", score: 2 }

        ]

      },

      {

        id: "q3",

        text: "Water temperature?",

        options: [

          { text: "Hot for everything", score: 0 },

          { text: "Warm mostly", score: 1 },

          { text: "Cold when possible", score: 2 }

        ]

      },

      {

        id: "q4",

        text: "How do you use detergent?",

        options: [

          { text: "Guess / pour randomly", score: 0 },

          { text: "Rough estimate", score: 1 },

          { text: "Measure properly", score: 2 }

        ]

      },

      {

        id: "q5",

        text: "Do you sort laundry?",

        options: [

          { text: "No sorting", score: 0 },

          { text: "Some sorting", score: 1 },

          { text: "Sort by colour/fabric", score: 2 }

        ]

      },

      {

        id: "q6",

        text: "Drying method?",

        options: [

          { text: "High heat always", score: 0 },

          { text: "Mix of dryer & air", score: 1 },

          { text: "Fabric-appropriate drying", score: 2 }

        ]

      },

      {

        id: "q7",

        text: "Clean the washing machine?",

        options: [

          { text: "Never 😬", score: 0 },

          { text: "Occasionally", score: 1 },

          { text: "Regularly", score: 2 }

        ]

      }

    ];

 

    function shuffleArray(items) {

      const array = [...items];

      for (let i = array.length - 1; i > 0; i -= 1) {

        const j = Math.floor(Math.random() * (i + 1));

        [array[i], array[j]] = [array[j], array[i]];

      }

      return array;

    }

 

    function renderQuiz() {

      const quizForm = document.getElementById("quizForm");

      const shuffledQuestions = shuffleArray(questions).map((question) => ({

        ...question,

        options: shuffleArray(question.options)

      }));

 

      quizForm.innerHTML = shuffledQuestions.map((question, index) => `

        <fieldset class="question">

          <p><strong>${index + 1}. ${question.text}</strong></p>

          ${question.options.map((option, optionIndex) => `

            <label class="option" for="${question.id}_${optionIndex}">

              <input

                type="radio"

                id="${question.id}_${optionIndex}"

                name="${question.id}"

                value="${option.score}"

              >

              ${option.text}

            </label>

          `).join("")}

        </fieldset>

      `).join("");

 

      document.getElementById("result").style.display = "none";

      document.getElementById("result").innerHTML = "";

    }

 

    function calculateScore() {

      const answerIds = questions.map((question) => question.id);

      let total = 0;

 

      for (const answerId of answerIds) {

        const selected = document.querySelector(`input[name="${answerId}"]:checked`);

        if (!selected) {

          alert("Please answer all questions!");

          return;

        }

        total += Number(selected.value);

      }

 

      let title = "";

      let summary = "";

      let tips = [];

 

      if (total <= 5) {

        title = "🧦 Laundry Chaos Goblin";

        summary = "Your laundry habits need some love. Start with a few simple improvements and you’ll get better results fast.";

        tips = [

          "Avoid overloading the machine so clothes can move properly.",

          "Measure detergent instead of free-pouring.",

          "Check care labels before washing anything delicate or new."

        ];

      } else if (total <= 10) {

        title = "🌀 Spin Cycle Survivor";

        summary = "You’re doing okay. A few smarter habits will make your washing gentler on clothes and more efficient overall.";

        tips = [

          "Sort a bit more consistently by colour or fabric.",

          "Use cooler washes when suitable.",

          "Choose drying methods based on fabric type instead of defaulting to high heat."

        ];

      } else {

        title = "✨ Laundry Legend";

        summary = "Nice work! Your laundry habits are efficient and effective. Keep the routine going.";

        tips = [

          "Keep checking labels for special-care items.",

          "Stay consistent with proper load size and detergent use.",

          "Keep cleaning the washing machine regularly to maintain freshness."

        ];

      }

 

      document.getElementById("result").innerHTML = `

        <h2>${title}</h2>

        <p class="score-badge">Score: ${total}/14</p>

        <p>${summary}</p>

        <ul class="tips">

          ${tips.map((tip) => `<li>${tip}</li>`).join("")}

        </ul>

      `;

      document.getElementById("result").style.display = "block";

 

      localStorage.setItem("lastScore", String(total));

      document.getElementById("result").scrollIntoView({ behavior: "smooth", block: "start" });

    }

 

    document.getElementById("resultButton").addEventListener("click", calculateScore);

 

    let views = localStorage.getItem("page_views");

    if (views) {

      views = parseInt(views, 10) + 1;

    } else {

      views = 1;

    }

    localStorage.setItem("page_views", views);

    document.getElementById("viewCount").innerText = views;

 

    renderQuiz();

  </script>

</body>

</html>
